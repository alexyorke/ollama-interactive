name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -v

  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t ollama-code:test .

      - name: Smoke CLI entrypoint
        run: docker run --rm ollama-code:test --help

      - name: Run unit tests in Docker image
        run: docker run --rm --entrypoint python ollama-code:test -m unittest discover -s tests -v

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - docker-image

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
