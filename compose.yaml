name: ollama-code

services:
  ollama-code:
    build:
      context: .
    image: ollama-code:local
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      OLLAMA_HOST: ${OLLAMA_CODE_OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_CODE_MODEL: ${OLLAMA_CODE_MODEL:-batiai/gemma4-26b:iq4}
      OLLAMA_CODE_WORKSPACE: /workspace
    extra_hosts:
      - host.docker.internal:host-gateway

  ollama-code-selfhost:
    image: ollama-code:local
    depends_on:
      ollama-code:
        condition: service_started
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ollama-code-selfhost-state:/opt/ollama-code/self-host
    entrypoint: ["/bin/bash", "/workspace/scripts/self_host_watchdog.sh"]
    command: ["python", "-m", "ollama_code.cli", "--cwd", "/workspace", "--approval", "auto", "--require-llm-for-turn"]
    environment:
      OLLAMA_CODE_OLLAMA_HOST: ${OLLAMA_CODE_OLLAMA_HOST:-http://host.docker.internal:11436}
      OLLAMA_HOST: ${OLLAMA_CODE_OLLAMA_HOST:-http://host.docker.internal:11436}
      OLLAMA_CODE_MODEL: ${OLLAMA_CODE_MODEL:-gemma4:e4b}
      OLLAMA_SELF_WORKSPACE: /workspace
      OLLAMA_SELF_STATE_DIR: /opt/ollama-code/self-host
      OLLAMA_SELF_LOOP: "1"
      OLLAMA_SELF_MAX_RESTARTS: "8"
      OLLAMA_SELF_RESTART_DELAY: "2"
      OLLAMA_SELF_CHECKPOINT_ON_SUCCESS: "1"
