name: ollama-code

services:
  ollama-code:
    build:
      context: .
    image: ollama-code:local
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      OLLAMA_HOST: ${OLLAMA_CODE_OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_CODE_MODEL: ${OLLAMA_CODE_MODEL:-batiai/gemma4-26b:iq4}
      OLLAMA_CODE_WORKSPACE: /workspace
    extra_hosts:
      - host.docker.internal:host-gateway
